name: yieldOS tests

on:
  pull_request:
    paths:
      - 'yieldOS/plugins/yieldos/**'
      - 'policy/**'
      - '.github/workflows/plugin.yml'
      - '.github/workflows/yieldos-tests.yml'

jobs:
  unit-tests-pr:
    name: unit tests - PR - ${{ matrix.os }} - node ${{ matrix.node }}
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22'
          - os: windows-latest
            node: '22'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
      - name: Run yieldOS test suite
        working-directory: yieldOS/plugins/yieldos
        run: node --test tests/*.test.js

  policy-validation:
    name: policy JSON valid + version bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Validate every JSON file in /policy/
        run: |
          set -e
          for f in policy/*.json; do
            echo "checking $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done
      - name: Verify shipped policy-cache mirrors /policy/
        run: |
          set -e
          for f in policy/*.json; do
            base=$(basename "$f")
            if ! diff -q "$f" "yieldOS/plugins/yieldos/policy-cache/$base" > /dev/null 2>&1; then
              echo "::error::policy/$base differs from yieldOS/plugins/yieldos/policy-cache/$base - sync them before merging"
              diff "$f" "yieldOS/plugins/yieldos/policy-cache/$base" || true
              exit 1
            fi
          done
      - name: Validate policy semantics
        run: node scripts/policy-check.mjs

  smoke:
    name: smoke (denylist blocks, allowlist passes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Smoke test denylist case (must exit 2)
        working-directory: yieldOS/plugins/yieldos
        run: |
          set -e
          mkdir -p /tmp/yos-ci
          INPUT='{"tool_name":"Bash","tool_input":{"command":"npm install event-stream@3.3.6"},"cwd":"/tmp/yos-ci"}'
          set +e
          echo -n "$INPUT" | node scripts/pre-install-gate.js > /tmp/out.json 2> /tmp/err.txt
          CODE=$?
          set -e
          if [ "$CODE" -ne 2 ]; then
            echo "::error::expected exit 2 for denylist, got $CODE"
            cat /tmp/err.txt
            exit 1
          fi
          grep -q 'denylist-match' /tmp/err.txt || (echo "::error::denylist-match verdict missing" && cat /tmp/err.txt && exit 1)
      - name: Smoke test allowlist case (must exit 0)
        working-directory: yieldOS/plugins/yieldos
        run: |
          set -e
          mkdir -p /tmp/yos-ci-2
          INPUT='{"tool_name":"Bash","tool_input":{"command":"npm install react@18.3.1"},"cwd":"/tmp/yos-ci-2"}'
          set +e
          echo -n "$INPUT" | node scripts/pre-install-gate.js > /tmp/out.json 2> /tmp/err.txt
          CODE=$?
          set -e
          if [ "$CODE" -ne 0 ]; then
            echo "::error::expected exit 0 for allowlist, got $CODE"
            cat /tmp/err.txt
            exit 1
          fi
          grep -q 'allowlist-match' /tmp/err.txt || (echo "::error::allowlist-match verdict missing" && cat /tmp/err.txt && exit 1)
      - name: Smoke test credentials read blocked (must exit 2)
        working-directory: yieldOS/plugins/yieldos
        run: |
          set -e
          mkdir -p /tmp/yos-ci-3
          echo "K=v" > /tmp/yos-ci-3/.env
          INPUT='{"tool_name":"Read","tool_input":{"file_path":"/tmp/yos-ci-3/.env"},"cwd":"/tmp/yos-ci-3"}'
          set +e
          echo -n "$INPUT" | node scripts/pre-install-gate.js > /tmp/out.json 2> /tmp/err.txt
          CODE=$?
          set -e
          if [ "$CODE" -ne 2 ]; then
            echo "::error::expected exit 2 for credentials read without auth, got $CODE"
            cat /tmp/err.txt
            exit 1
          fi
          grep -q 'credentials-read-blocked' /tmp/err.txt || (echo "::error::credentials-read-blocked verdict missing" && exit 1)
