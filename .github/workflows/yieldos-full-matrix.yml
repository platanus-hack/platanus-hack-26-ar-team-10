name: yieldOS full matrix

on:
  push:
    branches: [main]
    paths:
      - 'yieldOS/plugins/yieldos/**'
      - 'policy/**'
      - '.github/workflows/yieldos-full-matrix.yml'
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:

jobs:
  unit-tests-full:
    name: unit tests - full - ${{ matrix.os }} - node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
      - name: Run yieldOS test suite
        working-directory: yieldOS/plugins/yieldos
        run: node --test tests/*.test.js
