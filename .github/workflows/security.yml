name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e

  secret-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Run repository secret smoke scan
        run: node scripts/secret-scan-smoke.mjs
