name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4

  secret-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Run repository secret smoke scan
        run: node scripts/secret-scan-smoke.mjs
